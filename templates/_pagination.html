{% if page_obj.has_other_pages %}
<div style="display:flex;justify-content:center;align-items:center;gap:8px;margin-top:20px;margin-bottom:8px;">
  {% if page_obj.has_previous %}
  <a href="?{% if request.GET.status %}status={{ request.GET.status }}&{% endif %}page={{ page_obj.previous_page_number }}"
     style="display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;background:var(--bg-card);border:1px solid var(--border);text-decoration:none;color:var(--text);">
    <i class="bi bi-chevron-left"></i>
  </a>
  {% else %}
  <span style="display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;background:var(--bg);border:1px solid var(--border);color:var(--text-muted);">
    <i class="bi bi-chevron-left"></i>
  </span>
  {% endif %}

  <span style="font-size:13px;color:var(--text-muted);padding:0 8px;">
    Page {{ page_obj.number }} of {{ page_obj.paginator.num_pages }}
  </span>

  {% if page_obj.has_next %}
  <a href="?{% if request.GET.status %}status={{ request.GET.status }}&{% endif %}page={{ page_obj.next_page_number }}"
     style="display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;background:var(--bg-card);border:1px solid var(--border);text-decoration:none;color:var(--text);">
    <i class="bi bi-chevron-right"></i>
  </a>
  {% else %}
  <span style="display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;background:var(--bg);border:1px solid var(--border);color:var(--text-muted);">
    <i class="bi bi-chevron-right"></i>
  </span>
  {% endif %}
</div>
{% endif %}
