{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}

{% block header %}
<div class="app-header">
  <a href="{% url 'assembly:process_list' %}" class="back-btn"><i class="bi bi-chevron-left"></i></a>
  <div class="header-title">{{ title }}</div>
</div>
{% endblock %}

{% block content %}
<form method="post">
  {% csrf_token %}
  <div class="form-group">
    <label class="form-label">Bike Model</label>
    <select name="bike_model" class="form-control-app" required>
      <option value="">Select bike model...</option>
      {% for value, label in form.bike_model.field.choices %}
        {% if value %}<option value="{{ value }}" {% if form.bike_model.value|stringformat:"s" == value|stringformat:"s" %}selected{% endif %}>{{ label }}</option>{% endif %}
      {% endfor %}
    </select>
  </div>
  <div class="form-group">
    <label class="form-label">Process Name</label>
    <input type="text" name="name" class="form-control-app"
           placeholder="e.g. Standard Full Assembly"
           value="{{ form.name.value|default:'' }}" required>
  </div>
  <div class="form-group">
    <label class="form-label">Description (optional)</label>
    <textarea name="description" class="form-control-app textarea" rows="3"
              placeholder="Describe this process...">{{ form.description.value|default:'' }}</textarea>
  </div>
  <div class="form-group" style="display:flex;align-items:center;gap:10px;">
    <input type="checkbox" name="active" id="active-check"
           {% if form.active.value != False %}checked{% endif %}
           style="width:20px;height:20px;accent-color:var(--accent);">
    <label for="active-check" style="font-size:15px;font-weight:500;">Active process</label>
  </div>
  <div style="display:flex;gap:10px;">
    <button type="submit" class="btn-app primary" style="flex:1;">
      <i class="bi bi-check-lg"></i> Save
    </button>
    <a href="{% url 'assembly:process_list' %}" class="btn-app ghost" style="flex:1;text-decoration:none;">Cancel</a>
  </div>
</form>
{% endblock %}
