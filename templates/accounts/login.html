<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Ecoride">
  <meta name="theme-color" content="#080B12">
  <title>Login — Ecoride Assembly</title>
  {% load static %}
  <link rel="manifest" href="{% static 'manifest.json' %}">
  <link rel="apple-touch-icon" href="{% static 'ECORIDE_logo.png' %}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="{% static 'css/app.css' %}">
</head>
<body>
<div class="app-shell">
<div class="login-wrap">

  {% load static %}
  <img src="{% static 'ECORIDE_logo.png' %}?v=2" alt="Ecoride"
       style="height:220px;margin-bottom:8px;filter:invert(1);"
       onerror="this.style.display='none';document.getElementById('logo-fallback').style.display='block';">
  <div id="logo-fallback" class="login-logo" style="display:none;font-size:96px;">Ecoride<sup>®</sup></div>
  <div class="login-brand">Assembly Management System</div>

  <div class="login-card">
    <h6>Sign in</h6>
    <form method="post">
      {% csrf_token %}
      {% if form.non_field_errors %}
      <div class="toast-msg error" style="position:relative;margin-bottom:16px;">
        ❌ Incorrect username or password
      </div>
      {% endif %}
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control-app"
               placeholder="Your username" autocomplete="username"
               value="{{ form.username.value|default:'' }}" autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control-app"
               placeholder="Your password" autocomplete="current-password">
      </div>
      <button type="submit" class="btn-app primary" style="margin-top:8px;">
        <i class="bi bi-box-arrow-in-right"></i> Sign In
      </button>
    </form>
  </div>

  <p style="color:rgba(255,255,255,.25);font-size:11px;margin-top:24px;letter-spacing:.5px;">
    ECORIDE® ASSEMBLY v1.0
  </p>
</div>
</div>
{% load static %}
<script src="{% static 'js/app.js' %}"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }
</script>
</body>
</html>
